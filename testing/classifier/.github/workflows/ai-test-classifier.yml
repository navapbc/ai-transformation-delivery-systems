# .github/workflows/ai-test-classifier.yml
#
# AI test-classifier workflow. Runs the test-classifier skill on a pull
# request and posts ONE PR comment with the per-test verdicts and a mandatory
# 👍/👎 reaction ask.
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │ DISABLED BY DEFAULT                                                      │
# │                                                                         │
# │ To enable, change the trigger below from `on: workflow_dispatch:` to    │
# │ include `pull_request:` events, AND complete the setup steps in         │
# │ docs/SETUP.md:                                                          │
# │                                                                         │
# │   1. Add a repository variable:  AI_REVIEW_TOOL    = claude|codex|copilot│
# │   2. Add the matching API-key secret (see docs/SETUP.md                 │
# │      "GitHub Actions setup" section).                                   │
# │   3. Confirm the workflow has `pull-requests: write` permission         │
# │      (set below) — needed to post the one PR comment.                   │
# └─────────────────────────────────────────────────────────────────────────┘
#
# This workflow is INTENTIONALLY INDEPENDENT of your build/test jobs. It runs
# in parallel and never gates the build (the classifier is advisory). Do NOT
# add a `needs:` on this job from your build pipeline — keeping it decoupled is
# what lets a team drop the yaml in without touching their existing CI.

name: AI test classifier

# Currently opt-in: triggers only on manual dispatch. To enable automatic
# classification on every PR, uncomment the `pull_request:` block below.
on:
  workflow_dispatch:
  # pull_request:
  #   types: [opened, synchronize, reopened]

# Least-privilege permissions for the default GITHUB_TOKEN.
# `contents: read` is needed to check out the repo and run `git diff`.
# `pull-requests: write` is needed to post the one PR comment.
# `id-token: write` is needed ONLY when AI_PROVIDER=bedrock, so OIDC can mint a
# token to assume the AWS role (short-lived creds; no long-lived keys in repo).
permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  test-classifier:
    runs-on: ubuntu-latest
    # Skip on draft PRs by default — classify only when the PR is ready.
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    # The agent runs the repo's suite (AI_RUN_SUITE=1), slower than triage —
    # bound the job so a stuck install/test can't run for the 6h default.
    timeout-minutes: 30

    steps:
      - name: Validate workflow configuration
        env:
          AI_REVIEW_TOOL: ${{ vars.AI_REVIEW_TOOL }}
          # AI_PROVIDER is optional; empty means the default 'anthropic'.
          AI_PROVIDER:    ${{ vars.AI_PROVIDER }}
          # AWS_AUTH is optional; empty means the default 'oidc'.
          AWS_AUTH:       ${{ vars.AWS_AUTH }}
          AWS_REGION_IN:  ${{ vars.AWS_REGION }}
          AWS_ROLE_IN:    ${{ vars.AWS_ROLE_TO_ASSUME }}
          AWS_BEARER_IN:  ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
        run: |
          if [[ -z "${AI_REVIEW_TOOL}" ]]; then
            echo "::error::Repository variable AI_REVIEW_TOOL is not set."
            echo "::error::Set it under Settings → Secrets and variables → Actions → Variables"
            echo "::error::to one of: claude | codex | copilot"
            exit 1
          fi
          case "${AI_REVIEW_TOOL}" in
            claude|codex|copilot) ;;
            *)
              echo "::error::AI_REVIEW_TOOL='${AI_REVIEW_TOOL}' is invalid."
              echo "::error::Must be one of: claude | codex | copilot"
              exit 1
              ;;
          esac
          # Provider axis (orthogonal to tool). Default 'anthropic' when unset.
          PROVIDER="${AI_PROVIDER:-anthropic}"
          case "${PROVIDER}" in anthropic|bedrock) ;; *)
            echo "::error::AI_PROVIDER='${PROVIDER}' is invalid. Must be anthropic | bedrock"; exit 1 ;;
          esac
          if [[ "${PROVIDER}" == "bedrock" ]]; then
            # bedrock works for claude (Claude models) and codex (OpenAI GPT-5.x
            # via Codex's built-in bedrock provider). Copilot has no Bedrock path.
            case "${AI_REVIEW_TOOL}" in
              claude|codex) ;;
              *)
                echo "::error::AI_PROVIDER=bedrock requires AI_REVIEW_TOOL=claude or codex (got '${AI_REVIEW_TOOL}')."
                echo "::error::Copilot has no Bedrock provider. Note: codex on Bedrock runs OpenAI models, not Claude."
                exit 1
                ;;
            esac
            [[ -z "${AWS_REGION_IN}" ]]  && { echo "::error::AI_PROVIDER=bedrock requires repo variable AWS_REGION (e.g. us-east-1)."; exit 1; }
            case "${AWS_AUTH:-oidc}" in
              oidc)   [[ -z "${AWS_ROLE_IN}" ]]   && { echo "::error::AI_PROVIDER=bedrock + AWS_AUTH=oidc requires repo variable AWS_ROLE_TO_ASSUME (IAM role ARN)."; exit 1; } ;;
              static) [[ -z "${AWS_BEARER_IN}" ]] && { echo "::error::AI_PROVIDER=bedrock + AWS_AUTH=static requires the AWS_BEARER_TOKEN_BEDROCK secret."; exit 1; } ;;
              *)      echo "::error::AWS_AUTH='${AWS_AUTH}' invalid. Must be oidc | static"; exit 1 ;;
            esac
          fi
          true

      - name: Check out PR head (full history for diff)
        uses: actions/checkout@v4
        with:
          # Full history so `git diff $BASE HEAD` works.
          fetch-depth: 0
          # Check out the PR's head SHA so the context matches what would merge.
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Make scripts executable
        working-directory: testing/classifier
        run: |
          chmod +x .skills/_lib/ai-classifier-dispatch.sh
          chmod +x .skills/test-classifier/scripts/test-classifier-dispatcher.sh

      # Bedrock auth (AI_PROVIDER=bedrock only): OIDC → short-lived STS creds for
      # the caller-owned IAM role. Claude Code picks them up via the AWS SDK
      # credential chain. No long-lived AWS keys in the repo.
      - name: Configure AWS credentials (Bedrock via OIDC)
        if: vars.AI_PROVIDER == 'bedrock' && vars.AWS_AUTH != 'static'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: ai-test-classifier-${{ github.run_id }}

      - name: Install AI CLI — Claude Code
        if: vars.AI_REVIEW_TOOL == 'claude'
        run: npm install -g @anthropic-ai/claude-code

      - name: Install AI CLI — Codex
        if: vars.AI_REVIEW_TOOL == 'codex'
        run: npm install -g @openai/codex

      - name: Install AI CLI — Copilot
        if: vars.AI_REVIEW_TOOL == 'copilot'
        run: npm install -g @github/copilot

      # Codex + Bedrock: write a CI-local config.toml pointing Codex at its
      # built-in amazon-bedrock provider, so inference runs an OpenAI model
      # (GPT-5.x) in the caller's AWS account. Codex uses the AWS credential
      # chain, so the creds the OIDC step exported are picked up automatically.
      # The model is an OpenAI model ID — NOT Claude (Bedrock Claude uses the
      # Messages API, which Codex does not).
      - name: Configure Codex for Bedrock
        if: vars.AI_REVIEW_TOOL == 'codex' && vars.AI_PROVIDER == 'bedrock'
        env:
          CODEX_BEDROCK_REGION: ${{ vars.AWS_REGION }}
          CODEX_BEDROCK_MODEL:  ${{ vars.AWS_BEDROCK_MODEL || 'openai.gpt-5.5' }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/codex-home
          echo "[test-classifier] Codex → Bedrock: model=${CODEX_BEDROCK_MODEL} region=${CODEX_BEDROCK_REGION}"
          printf '%s\n' \
            "model = \"${CODEX_BEDROCK_MODEL}\"" \
            'model_provider = "amazon-bedrock"' \
            '[model_providers.amazon-bedrock]' \
            'name = "Amazon Bedrock"' \
            '[model_providers.amazon-bedrock.aws]' \
            "region = \"${CODEX_BEDROCK_REGION}\"" \
            > /tmp/codex-home/config.toml

      - name: Run AI test classifier
        working-directory: testing/classifier
        env:
          AI_REVIEW_TOOL: ${{ vars.AI_REVIEW_TOOL }}
          CI: 'true'
          # Grant the agent execution so it runs the repo's suite for OBSERVED
          # verdicts (safe on the ephemeral runner). OBSERVED is the default;
          # set explicitly here so CI's behavior is pinned and self-documenting.
          AI_RUN_SUITE: '1'
          # Pass through whichever API key matches the chosen tool. Each secret
          # is set only if the team uses that tool — unused ones stay blank.
          # On AI_PROVIDER=bedrock, ANTHROPIC_API_KEY is forced blank so the CLI
          # routes through Bedrock (a non-empty key would override Bedrock).
          ANTHROPIC_API_KEY: ${{ vars.AI_PROVIDER == 'bedrock' && '' || secrets.ANTHROPIC_API_KEY }}
          # On bedrock, blank OPENAI_API_KEY too so codex routes through the
          # config.toml amazon-bedrock provider unambiguously.
          OPENAI_API_KEY:    ${{ vars.AI_PROVIDER == 'bedrock' && '' || secrets.OPENAI_API_KEY }}
          # Claude+Bedrock routing (gated on tool=claude; blank otherwise). Model
          # must be a cross-region inference profile (us. prefix); defaults to
          # Sonnet 4.6 when AWS_BEDROCK_MODEL var is unset. The codex+bedrock path
          # is configured via config.toml in the "Configure Codex for Bedrock"
          # step, not these Claude-specific vars.
          CLAUDE_CODE_USE_BEDROCK: ${{ (vars.AI_PROVIDER == 'bedrock' && vars.AI_REVIEW_TOOL == 'claude') && '1' || '' }}
          AWS_REGION:       ${{ vars.AI_PROVIDER == 'bedrock' && vars.AWS_REGION || '' }}
          # Static auth: long-lived Bedrock API key (claude + codex both honor it,
          # it takes precedence over SigV4). Blank on the OIDC path.
          AWS_BEARER_TOKEN_BEDROCK: ${{ (vars.AI_PROVIDER == 'bedrock' && vars.AWS_AUTH == 'static') && secrets.AWS_BEARER_TOKEN_BEDROCK || '' }}
          ANTHROPIC_MODEL:  ${{ (vars.AI_PROVIDER == 'bedrock' && vars.AI_REVIEW_TOOL == 'claude') && (vars.AWS_BEDROCK_MODEL || 'us.anthropic.claude-sonnet-4-6') || '' }}
          # Point Codex at the CI-local config.toml when the Bedrock step wrote one
          # (codex+bedrock). Harmless on other paths — Codex isn't invoked there,
          # and an unset/missing CODEX_HOME just falls back to the default.
          CODEX_HOME: ${{ (vars.AI_REVIEW_TOOL == 'codex' && vars.AI_PROVIDER == 'bedrock') && '/tmp/codex-home' || '' }}
          # gh CLI picks up GITHUB_TOKEN automatically.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PR number and base ref come from the workflow context.
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF:  ${{ github.event.pull_request.base.ref }}

          # ── Observability (Claude Code native OpenTelemetry) ───────────────
          # Telemetry on, but the span/metric EXPORTER defaults to `none`: Claude's
          # `console` exporter writes to STDOUT and would corrupt the parsed result
          # (it dumped ~875KB of metric JSON into the record before we caught it).
          # Instead we capture full request/response bodies straight to disk
          # (agent-bodies/, no stream collision). To ship real spans/metrics, set
          # OTEL_EXPORTER=otlp + endpoint/headers — OTLP is a network exporter and
          # never touches stdout. No code change.
          CLAUDE_CODE_ENABLE_TELEMETRY: '1'
          OTEL_METRICS_EXPORTER: ${{ vars.OTEL_EXPORTER || 'none' }}
          OTEL_LOGS_EXPORTER:    ${{ vars.OTEL_EXPORTER || 'none' }}
          OTEL_TRACES_EXPORTER:  ${{ vars.OTEL_EXPORTER || 'none' }}
          OTEL_METRIC_EXPORT_INTERVAL: '2000'
          OTEL_LOGS_EXPORT_INTERVAL:   '500'
          CLAUDE_CODE_OTEL_SHUTDOWN_TIMEOUT_MS: '8000'
          OTEL_LOG_RAW_API_BODIES: 'file:classifier-out/agent-bodies'
          OTEL_LOG_TOOL_DETAILS: '1'
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_PROTOCOL: ${{ vars.OTEL_EXPORTER_OTLP_PROTOCOL }}
          OTEL_EXPORTER_OTLP_HEADERS:  ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
          OTEL_RESOURCE_ATTRIBUTES: service.name=ai-test-classifier,pr=${{ github.event.pull_request.number }},repo=${{ github.repository }}
        run: |
          set -euo pipefail

          if [[ -z "${PR_NUMBER:-}" ]]; then
            echo "::warning::No PR context (likely a manual workflow_dispatch). Skipping."
            exit 0
          fi

          # Make sure origin/<base-ref> resolves locally — actions/checkout
          # fetches the head SHA but may not set up a refs/remotes entry.
          git fetch --no-tags --depth=200 origin "${BASE_REF}:refs/remotes/origin/${BASE_REF}" || true

          mkdir -p classifier-out/agent-bodies
          DISPATCHER=".skills/test-classifier/scripts/test-classifier-dispatcher.sh"

          # Post ONE PR comment with the per-test verdicts + rationale and the
          # mandatory 👍/👎 ask (the tuning signal). Non-blocking.
          "${DISPATCHER}" \
            --pr "${PR_NUMBER}" \
            --post-comment \
            | tee classifier-out/classification.txt
            # --gate   # (advisory by default — uncomment to fail the build on CLASSIFIED)

      - name: Upload classification record
        # Always upload: the artifact is the audit trail alongside the posted
        # PR comment.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-test-classification
          path: testing/classifier/classifier-out/
          if-no-files-found: ignore
