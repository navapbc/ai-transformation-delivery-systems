# testing/classifier/ci/otel-collector-codex.yaml
#
# OpenTelemetry Collector config for capturing Codex CLI telemetry in CI.
#
# WHY THIS EXISTS
# Codex (unlike Claude Code) has no "write raw bodies to a file" mode. Its only
# OTel exporters are OTLP over the network (otlp-http / otlp-grpc). To reach
# parity with the Claude path — which captures a default on-runner FILE artifact
# *and* optionally forwards to a real backend — we run this collector inside the
# CI job. Codex always exports to the collector at localhost:4318; the collector
# then fans the signals out:
#
#   • file exporter   — ALWAYS on. Writes every span/log to a JSONL file that the
#     workflow uploads as the `ai-test-classification` artifact. This is the
#     default, no-backend-required capture (mirrors Claude's agent-bodies/).
#   • otlphttp exporter — only wired into the pipelines when a real backend is
#     configured (repo/org var OTEL_EXPORTER=otlp). The workflow generates the
#     `${OTLP_FORWARD_*}` env from that var; when it is empty the exporter still
#     loads but points nowhere, so we keep it OUT of the active pipeline unless
#     forwarding is requested (the workflow swaps in the *-forward pipelines).
#
# Codex emits TRACES and LOGS (logs carry the request/response/event bodies);
# it does not emit metrics from `codex exec`, so there is no metrics pipeline.

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  # Small batches + short timeout: CI runs are short-lived, so flush often.
  batch:
    timeout: 1s
    send_batch_size: 256

exporters:
  # Default sink — the CI artifact. One JSON object per line.
  file:
    path: /tmp/codex-otel/codex-traces.jsonl

  # Optional forward to a real backend. Endpoint/headers are filled in by the
  # workflow from repo/org vars+secret ONLY when OTEL_EXPORTER=otlp; otherwise
  # these env expand to empty and this exporter stays out of the live pipeline.
  otlphttp:
    endpoint: ${env:OTLP_FORWARD_ENDPOINT}
    headers:
      authorization: ${env:OTLP_FORWARD_AUTH}

service:
  # Default pipelines: file only. The workflow overrides the `exporters` lists
  # below (adds `otlphttp`) by templating this file when forwarding is enabled.
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [file]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [file]
  telemetry:
    logs:
      level: warn
