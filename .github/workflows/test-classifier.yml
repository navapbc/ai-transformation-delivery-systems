# .github/workflows/test-classifier.yml
#
# REUSABLE workflow for the AI test classifier.
#
# This is the supported way to consume the classifier in another repo WITHOUT
# vendoring the bundle's files. A consumer repo adds a tiny caller workflow that
# references this one at the `@pilot` tag — no copied scripts:
#
#   # .github/workflows/ai-test-classifier.yml in the CONSUMER repo
#   name: AI test classifier
#   on:
#     # Lifecycle-aware: run AFTER the repo's test workflow finishes, so the
#     # classifier can read the REAL test results. See caller-workflow.yml.
#     workflow_run:
#       workflows: ["Test"]            # the consumer's test workflow name
#       types: [completed]
#   jobs:
#     classify:
#       uses: navapbc/ai-transformation-delivery-systems/.github/workflows/test-classifier.yml@pilot
#       with:
#         tool: claude          # claude | codex | copilot
#         # ref: <sha>          # optional: override the bundle ref; defaults to @pilot
#       secrets:
#         ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
#         # OPENAI_API_KEY:  ${{ secrets.OPENAI_API_KEY }}   # only if tool=codex
#
# Signal: triggered via workflow_run, it downloads the test run's results
# artifact and classifies the REAL failures (OBSERVED). With no artifact it falls
# back to diff-only prediction (INFERRED), labeled as such. See the
# test-results-artifact input below.
#
# `pilot` is a MOVING tag that always tracks the latest classifier on main; the
# move-tag.yml workflow re-points it automatically whenever the classifier
# changes on main. Consumers who reference `@pilot` therefore auto-update with
# no yaml change; they set this caller up once and never touch it. A team that
# wants to freeze a specific version can pin `@<commit-sha>` instead, at the cost
# of bumping it manually. (The source repo is public, so the consumer's default
# token resolves this workflow and checks out its scripts; no PAT needed.)

name: AI test classifier (reusable)

on:
  workflow_call:
    inputs:
      tool:
        description: 'AI CLI to use: claude | codex | copilot'
        type: string
        required: true
      ref:
        description: >
          Git ref (tag/branch/SHA) of the source repo to check out the
          classifier scripts from. Defaults to the moving 'pilot' tag (latest on
          main). Override only to freeze a specific version; keep it in sync with
          the ref you pinned the uses: line to.
        type: string
        default: ''
      test-results-artifact:
        description: >
          Artifact name the test workflow uploads with its results (JUnit XML /
          run log). On a workflow_run trigger it's downloaded and fed to the
          classifier (OBSERVED mode); absent, the classifier falls back to
          diff-only (INFERRED).
        type: string
        default: 'ai-test-results'
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false

# Least-privilege: read the consumer's code; write the PR comment.
# `actions: read` is needed to list and download the triggering test run's
# artifact when this workflow is invoked via `workflow_run`.
permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  classify:
    runs-on: ubuntu-latest
    # Non-draft PRs, or any workflow_run (the "is it a PR?" check happens in
    # Resolve PR context, which skips cleanly when there's no PR).
    if: >-
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
      || github.event_name == 'workflow_run'
    steps:
      - name: Validate inputs
        env:
          TOOL: ${{ inputs.tool }}
        run: |
          case "${TOOL}" in claude|codex|copilot) ;; *)
            echo "::error::inputs.tool='${TOOL}' invalid. Must be claude | codex | copilot"; exit 1 ;;
          esac

      # Resolve PR number/head/base for either trigger. workflow_run that wasn't
      # for a PR → skip=1 and later steps no-op.
      - name: Resolve PR context
        id: pr
        env:
          EVENT_NAME: ${{ github.event_name }}
          # pull_request fields
          PR_EVENT_NUMBER:  ${{ github.event.pull_request.number }}
          PR_EVENT_HEAD:    ${{ github.event.pull_request.head.sha }}
          PR_EVENT_BASE:    ${{ github.event.pull_request.base.ref }}
          # workflow_run fields
          WR_HEAD_SHA:      ${{ github.event.workflow_run.head_sha }}
          WR_CONCLUSION:    ${{ github.event.workflow_run.conclusion }}
          WR_RUN_ID:        ${{ github.event.workflow_run.id }}
          # workflow_run.pull_requests[] is only populated for same-repo PRs;
          # fork PRs leave it empty, so we also fall back to an API lookup by SHA.
          WR_PR_NUMBER:     ${{ github.event.workflow_run.pull_requests[0].number }}
          WR_PR_BASE:       ${{ github.event.workflow_run.pull_requests[0].base.ref }}
          GH_TOKEN:         ${{ github.token }}
          REPO:             ${{ github.repository }}
        run: |
          set -euo pipefail
          emit() { echo "$1=$2" >> "$GITHUB_OUTPUT"; }

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            emit skip "0"
            emit pr_number "${PR_EVENT_NUMBER}"
            emit head_sha  "${PR_EVENT_HEAD}"
            emit base_ref  "${PR_EVENT_BASE}"
            emit run_id    ""          # no upstream test run → INFERRED mode
            echo "[classifier] pull_request event → PR #${PR_EVENT_NUMBER} (INFERRED/diff-only unless results are attached)."
            exit 0
          fi

          # workflow_run path.
          local_pr="${WR_PR_NUMBER}"
          base_ref="${WR_PR_BASE}"

          # Fork PRs (and some configs) leave pull_requests[] empty. Recover the
          # PR by matching the triggering run's head SHA to an open PR.
          if [[ -z "${local_pr}" ]]; then
            echo "[classifier] workflow_run.pull_requests[] empty — looking up PR by head SHA ${WR_HEAD_SHA}."
            local_pr="$(gh pr list --repo "${REPO}" --state open \
              --json number,headRefOid \
              --jq "map(select(.headRefOid==\"${WR_HEAD_SHA}\")) | .[0].number" 2>/dev/null || true)"
            if [[ -n "${local_pr}" && "${local_pr}" != "null" ]]; then
              base_ref="$(gh pr view "${local_pr}" --repo "${REPO}" --json baseRefName --jq '.baseRefName' 2>/dev/null || true)"
            fi
          fi

          if [[ -z "${local_pr}" || "${local_pr}" == "null" ]]; then
            echo "::notice::Triggering test run was not associated with a PR — nothing to classify. Skipping."
            emit skip "1"
            exit 0
          fi

          emit skip "0"
          emit pr_number "${local_pr}"
          emit head_sha  "${WR_HEAD_SHA}"
          emit base_ref  "${base_ref}"
          emit run_id    "${WR_RUN_ID}"
          echo "[classifier] workflow_run event → PR #${local_pr} (base: ${base_ref}); test run ${WR_RUN_ID} concluded '${WR_CONCLUSION}'."

      # The consumer's repo at the resolved PR head — what the dispatcher diffs.
      - name: Check out the caller's repo (the change under test)
        if: steps.pr.outputs.skip != '1'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.head_sha }}

      # Download the test run's results artifact (workflow_run only). Missing or
      # empty is non-fatal — the dispatcher falls back to diff-only.
      - name: Download test results from the triggering run
        id: results
        if: steps.pr.outputs.skip != '1' && steps.pr.outputs.run_id != ''
        env:
          GH_TOKEN: ${{ github.token }}
          REPO:     ${{ github.repository }}
          RUN_ID:   ${{ steps.pr.outputs.run_id }}
          ARTIFACT: ${{ inputs.test-results-artifact }}
        run: |
          set -euo pipefail
          dest="$GITHUB_WORKSPACE/.ai-test-results"
          mkdir -p "${dest}"
          if gh run download "${RUN_ID}" --repo "${REPO}" --name "${ARTIFACT}" --dir "${dest}" 2>/dev/null; then
            # Flatten everything readable into one signal file for the dispatcher.
            signal="${dest}/_signal.txt"
            : > "${signal}"
            found=0
            while IFS= read -r -d '' f; do
              {
                echo "===== ${f#${dest}/} ====="
                cat "${f}"
                echo
              } >> "${signal}"
              found=1
            done < <(find "${dest}" -type f ! -name '_signal.txt' -print0)
            if [[ "${found}" == "1" ]]; then
              echo "results_path=${signal}" >> "$GITHUB_OUTPUT"
              echo "[classifier] OBSERVED mode — downloaded '${ARTIFACT}' from run ${RUN_ID}."
            else
              echo "::notice::Artifact '${ARTIFACT}' was empty — falling back to INFERRED/diff-only."
            fi
          else
            echo "::notice::No '${ARTIFACT}' artifact on run ${RUN_ID} — falling back to INFERRED/diff-only."
          fi

      # 2. THIS bundle's scripts. The source repo is public, so a plain
      #    actions/checkout of it works with the default token — no tarball, no
      #    PAT, no access gymnastics. We use `inputs.ref` (a tag/SHA the caller
      #    can override), defaulting to the moving `pilot` tag so the scripts
      #    match the latest released workflow. Lands in ./.classifier-bundle.
      - name: Check out the classifier bundle (pinned)
        uses: actions/checkout@v4
        with:
          repository: navapbc/ai-transformation-delivery-systems
          ref: ${{ inputs.ref != '' && inputs.ref || 'pilot' }}
          path: .classifier-bundle
          fetch-depth: 1

      # Stage the bundle's testing/ tree into the caller's workspace so every
      # repo-relative path the dispatcher and its prompt use (e.g.
      # testing/classifier/.skills/test-classifier/SKILL.md) resolves exactly as
      # in a local or vendored install — one dispatcher code path for all.
      - name: Stage the bundle into the workspace
        if: steps.pr.outputs.skip != '1'
        run: |
          set -euo pipefail
          cp -R .classifier-bundle/testing "$GITHUB_WORKSPACE/testing"
          chmod +x testing/classifier/.skills/_lib/ai-classifier-dispatch.sh
          chmod +x testing/classifier/.skills/test-classifier/scripts/test-classifier-dispatcher.sh
          chmod +x testing/classifier/scripts/sync-skills.sh

      - name: Sync canonical SKILL.md into the chosen tool's directory
        if: steps.pr.outputs.skip != '1'
        working-directory: testing/classifier
        env:
          AI_REVIEW_TOOL: ${{ inputs.tool }}
        run: scripts/sync-skills.sh

      - name: Install AI CLI — Claude Code
        if: steps.pr.outputs.skip != '1' && inputs.tool == 'claude'
        run: npm install -g @anthropic-ai/claude-code
      - name: Install AI CLI — Codex
        if: steps.pr.outputs.skip != '1' && inputs.tool == 'codex'
        run: npm install -g @openai/codex
      - name: Install AI CLI — Copilot
        if: steps.pr.outputs.skip != '1' && inputs.tool == 'copilot'
        run: npm install -g @github/copilot

      - name: Run AI test classifier
        if: steps.pr.outputs.skip != '1'
        env:
          AI_REVIEW_TOOL: ${{ inputs.tool }}
          CI: 'true'
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          BASE_REF:  ${{ steps.pr.outputs.base_ref }}
          # Real test-results file, or empty → INFERRED/diff-only.
          AI_TEST_RESULTS: ${{ steps.results.outputs.results_path }}
        run: |
          set -euo pipefail

          if [[ -z "${PR_NUMBER:-}" ]]; then
            echo "::warning::No PR context. Skipping."; exit 0
          fi

          # The bundle's testing/ tree was staged into the caller's workspace,
          # so the dispatcher and its prompt see the same repo-relative layout
          # as a local/vendored install, while git diff still sees the caller's PR.
          DISPATCHER="testing/classifier/.skills/test-classifier/scripts/test-classifier-dispatcher.sh"

          # Make origin/<base-ref> resolvable for the diff range.
          git fetch --no-tags --depth=200 origin "${BASE_REF}:refs/remotes/origin/${BASE_REF}" || true

          # Classify the PR's failing tests and post ONE comment with the 👍/👎 ask.
          # The full report is also captured as a CI artifact.
          mkdir -p classifier-out
          "${DISPATCHER}" --pr "${PR_NUMBER}" --post-comment \
            | tee classifier-out/classification.txt

      - name: Upload classification record
        if: always() && steps.pr.outputs.skip != '1'
        uses: actions/upload-artifact@v4
        with:
          name: ai-test-classification
          path: classifier-out/
          if-no-files-found: ignore
