# .github/workflows/test-classifier.yml
#
# REUSABLE workflow for the AI test classifier.
#
# This is the supported way to consume the classifier in another repo WITHOUT
# vendoring the bundle's files. A consumer repo adds a tiny caller workflow that
# references this one at the `@pilot` tag — no copied scripts:
#
#   # .github/workflows/ai-test-classifier.yml in the CONSUMER repo
#   name: AI test classifier
#   on:
#     pull_request:
#       types: [opened, synchronize, reopened]
#   jobs:
#     classify:
#       uses: navapbc/ai-transformation-delivery-systems/.github/workflows/test-classifier.yml@pilot
#       with:
#         tool: claude          # claude | codex | copilot
#         # ref: <sha>          # optional: override the bundle ref; defaults to @pilot
#       secrets:
#         ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
#         # OPENAI_API_KEY:  ${{ secrets.OPENAI_API_KEY }}   # only if tool=codex
#
# `pilot` is a MOVING tag that always tracks the latest classifier on main; the
# move-tag.yml workflow re-points it automatically whenever the classifier
# changes on main. Consumers who reference `@pilot` therefore auto-update with
# no yaml change; they set this caller up once and never touch it. A team that
# wants to freeze a specific version can pin `@<commit-sha>` instead, at the cost
# of bumping it manually. (The source repo is public, so the consumer's default
# token resolves this workflow and checks out its scripts; no PAT needed.)

name: AI test classifier (reusable)

on:
  workflow_call:
    inputs:
      tool:
        description: 'AI CLI to use: claude | codex | copilot'
        type: string
        required: true
      ref:
        description: >
          Git ref (tag/branch/SHA) of the source repo to check out the
          classifier scripts from. Defaults to the moving 'pilot' tag (latest on
          main). Override only to freeze a specific version; keep it in sync with
          the ref you pinned the uses: line to.
        type: string
        default: ''
      provider:
        description: >
          Where inference runs: 'anthropic' (default, direct API via
          ANTHROPIC_API_KEY / OPENAI_API_KEY) or 'bedrock' (Amazon Bedrock in the
          caller's own AWS account, authenticated via GitHub OIDC). 'bedrock'
          works with tool=claude (Claude models) or tool=codex (OpenAI GPT-5.x
          models); it is NOT supported with tool=copilot. Note Codex on Bedrock
          runs OpenAI models, not Claude (Bedrock Claude needs the Messages API,
          which Codex doesn't use). See testing/classifier/docs/BEDROCK.md.
        type: string
        default: 'anthropic'
      aws-region:
        description: >
          AWS region for Bedrock (required when provider=bedrock). Must be a
          region where the caller's account has Anthropic model access enabled,
          e.g. us-east-1. Ignored when provider=anthropic.
        type: string
        default: ''
      aws-auth:
        description: >
          How the Bedrock path authenticates to AWS (when provider=bedrock):
          'oidc' (default, recommended) assumes aws-role-to-assume via GitHub
          OIDC — no stored AWS credentials. 'static' skips OIDC and uses a
          long-lived AWS_BEARER_TOKEN_BEDROCK secret instead (simpler 2-step
          quick-start, weaker posture — a credential lives in the repo). Ignored
          when provider=anthropic.
        type: string
        default: 'oidc'
      aws-role-to-assume:
        description: >
          ARN of the IAM role to assume via GitHub OIDC. Required when
          provider=bedrock AND aws-auth=oidc; ignored for aws-auth=static. The
          role's trust policy must allow this repo's OIDC subject; its
          permissions policy must allow bedrock:InvokeModel*.
        type: string
        default: ''
      bedrock-model:
        description: >
          Bedrock model ID (used when provider=bedrock). Leave empty to use the
          per-tool default: claude → us.anthropic.claude-sonnet-4-6 (a
          cross-region inference profile ID); codex → openai.gpt-5.5. Override to
          pin a different model; for claude it must be an inference profile ID.
        type: string
        default: ''
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
      AWS_BEARER_TOKEN_BEDROCK:
        # Long-lived Bedrock API key. Required only for provider=bedrock with
        # aws-auth=static; unused on the OIDC and direct-API paths.
        required: false

# Least-privilege: read the consumer's code; write the PR comment.
# `id-token: write` is required ONLY for provider=bedrock — it lets
# aws-actions/configure-aws-credentials mint a per-run OIDC token to exchange for
# short-lived STS credentials (no long-lived AWS keys in the repo). It is unused
# and harmless on the default provider=anthropic path.
permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  classify:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    # The agent locates, installs, and RUNS the repo's suite (AI_RUN_SUITE=1),
    # which is much slower than diff-only triage. Bound the job so a stuck
    # install/test can't run for the full 6h default. AI_SUITE_TIMEOUT_SECS in
    # the dispatcher is the inner bound; this is the outer one.
    timeout-minutes: 30
    steps:
      - name: Validate inputs
        env:
          TOOL: ${{ inputs.tool }}
          PROVIDER: ${{ inputs.provider }}
          AWS_AUTH: ${{ inputs.aws-auth }}
          AWS_REGION_IN: ${{ inputs.aws-region }}
          AWS_ROLE_IN: ${{ inputs.aws-role-to-assume }}
          AWS_BEARER_IN: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
        run: |
          case "${TOOL}" in claude|codex|copilot) ;; *)
            echo "::error::inputs.tool='${TOOL}' invalid. Must be claude | codex | copilot"; exit 1 ;;
          esac
          case "${PROVIDER}" in anthropic|bedrock) ;; *)
            echo "::error::inputs.provider='${PROVIDER}' invalid. Must be anthropic | bedrock"; exit 1 ;;
          esac
          if [[ "${PROVIDER}" == "bedrock" ]]; then
            # Bedrock is supported for claude (Claude models via the Claude Code
            # CLI) and codex (OpenAI GPT-5.x via Codex's built-in bedrock
            # provider). Copilot has no Bedrock path, so reject it.
            case "${TOOL}" in
              claude|codex) ;;
              *)
                echo "::error::provider=bedrock requires tool=claude or tool=codex (got tool='${TOOL}')."
                echo "::error::Copilot has no Bedrock provider. Note: codex on Bedrock runs OpenAI models, not Claude."
                exit 1
                ;;
            esac
            if [[ -z "${AWS_REGION_IN}" ]]; then
              echo "::error::provider=bedrock requires inputs.aws-region (e.g. us-east-1)."; exit 1
            fi
            case "${AWS_AUTH:-oidc}" in
              oidc)
                if [[ -z "${AWS_ROLE_IN}" ]]; then
                  echo "::error::provider=bedrock + aws-auth=oidc requires inputs.aws-role-to-assume (the IAM role ARN)."; exit 1
                fi
                ;;
              static)
                if [[ -z "${AWS_BEARER_IN}" ]]; then
                  echo "::error::provider=bedrock + aws-auth=static requires the AWS_BEARER_TOKEN_BEDROCK secret."; exit 1
                fi
                ;;
              *)
                echo "::error::inputs.aws-auth='${AWS_AUTH}' invalid. Must be oidc | static"; exit 1 ;;
            esac
          fi

      # 1. The CONSUMER's repo — this is what the dispatcher diffs and classifies.
      - name: Check out the caller's repo (the change under test)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      # 2. THIS bundle's scripts. The source repo is public, so a plain
      #    actions/checkout of it works with the default token — no tarball, no
      #    PAT, no access gymnastics. We use `inputs.ref` (a tag/SHA the caller
      #    can override), defaulting to the moving `pilot` tag so the scripts
      #    match the latest released workflow. Lands in ./.classifier-bundle.
      - name: Check out the classifier bundle (pinned)
        uses: actions/checkout@v4
        with:
          repository: navapbc/ai-transformation-delivery-systems
          ref: ${{ inputs.ref != '' && inputs.ref || 'pilot' }}
          path: .classifier-bundle
          fetch-depth: 1

      # Stage the bundle's testing/ tree into the caller's workspace so every
      # repo-relative path the dispatcher and its prompt use (e.g.
      # testing/classifier/.skills/test-classifier/SKILL.md) resolves exactly as
      # in a local or vendored install — one dispatcher code path for all.
      - name: Stage the bundle into the workspace
        run: |
          set -euo pipefail
          cp -R .classifier-bundle/testing "$GITHUB_WORKSPACE/testing"
          chmod +x testing/classifier/.skills/_lib/ai-classifier-dispatch.sh
          chmod +x testing/classifier/.skills/test-classifier/scripts/test-classifier-dispatcher.sh
          chmod +x testing/classifier/scripts/fetch-skills.sh

      - name: Vendor SKILL.md from agent-skills
        working-directory: testing/classifier
        run: scripts/fetch-skills.sh

      # ── Bedrock auth (provider=bedrock only) ────────────────────────────────
      # Exchange this run's GitHub OIDC token for short-lived STS credentials by
      # assuming the caller-owned IAM role. The action exports AWS_ACCESS_KEY_ID/
      # _SECRET_ACCESS_KEY/_SESSION_TOKEN into the job env, which the Claude Code
      # CLI then picks up via the default AWS SDK credential chain. No long-lived
      # AWS keys are stored in the repo. Skipped entirely on provider=anthropic.
      - name: Configure AWS credentials (Bedrock via OIDC)
        if: inputs.provider == 'bedrock' && inputs.aws-auth != 'static'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws-role-to-assume }}
          aws-region: ${{ inputs.aws-region }}
          role-session-name: ai-test-classifier-${{ github.run_id }}

      - name: Install AI CLI — Claude Code
        if: inputs.tool == 'claude'
        run: npm install -g @anthropic-ai/claude-code
      - name: Install AI CLI — Codex
        if: inputs.tool == 'codex'
        run: npm install -g @openai/codex
      - name: Install AI CLI — Copilot
        if: inputs.tool == 'copilot'
        run: npm install -g @github/copilot

      # ── Codex observability bootstrap (parity with the Claude path) ─────────
      # Codex has no file-body capture; its only sinks are OTLP over the network.
      # So for codex we run an in-job OpenTelemetry Collector that receives Codex's
      # OTLP and writes a JSONL artifact (always), and additionally forwards to a
      # real backend when vars.OTEL_EXPORTER=otlp is set — mirroring Claude's
      # "default file artifact + optional OTLP passthrough" behavior.
      - name: Start OTel collector for Codex
        if: inputs.tool == 'codex'
        env:
          OTEL_EXPORTER:               ${{ vars.OTEL_EXPORTER }}
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS:  ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
          # Bedrock routing for Codex: when set, we append a model_provider stanza
          # to config.toml so `codex exec` runs an OpenAI model in the caller's AWS
          # account. Empty on the default (direct OpenAI API) path.
          CODEX_PROVIDER: ${{ inputs.provider }}
          CODEX_BEDROCK_REGION: ${{ inputs.aws-region }}
          CODEX_BEDROCK_MODEL: ${{ inputs.bedrock-model != '' && inputs.bedrock-model || 'openai.gpt-5.5' }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/codex-otel
          CFG=testing/classifier/ci/otel-collector-codex.yaml

          # When a real backend is configured, add the otlphttp exporter to both
          # pipelines and feed it the endpoint/headers; otherwise leave the file-
          # only pipelines as-is. We use sed on the two `exporters: [file]` lines.
          if [[ "${OTEL_EXPORTER:-}" == "otlp" && -n "${OTEL_EXPORTER_OTLP_ENDPOINT:-}" ]]; then
            echo "[test-classifier] Codex OTel: file artifact + forwarding to ${OTEL_EXPORTER_OTLP_ENDPOINT}"
            export OTLP_FORWARD_ENDPOINT="${OTEL_EXPORTER_OTLP_ENDPOINT}"
            export OTLP_FORWARD_AUTH="${OTEL_EXPORTER_OTLP_HEADERS:-}"
            sed -i 's/exporters: \[file\]/exporters: [file, otlphttp]/' "${CFG}"
          else
            echo "[test-classifier] Codex OTel: file artifact only (no OTEL_EXPORTER=otlp backend set)"
            # otlphttp env must still expand to something; collector validates all
            # exporters even when unused. Point it at a dummy that's never wired in.
            export OTLP_FORWARD_ENDPOINT="http://localhost:4318"
            export OTLP_FORWARD_AUTH=""
          fi

          # Run the collector in the background, listening on localhost:4318/4317.
          docker run -d --name codex-otel \
            --network host \
            -e OTLP_FORWARD_ENDPOINT -e OTLP_FORWARD_AUTH \
            -v "$PWD/${CFG}:/etc/otelcol/config.yaml:ro" \
            -v /tmp/codex-otel:/tmp/codex-otel \
            otel/opentelemetry-collector:latest \
            --config /etc/otelcol/config.yaml

          # Wait for the OTLP HTTP port to accept connections before Codex runs.
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null "http://localhost:4318/" 2>/dev/null \
               || nc -z localhost 4318 2>/dev/null; then
              echo "[test-classifier] collector up on :4318"; break
            fi
            sleep 1
          done

          # Generate the Codex config.toml under a CI-local CODEX_HOME. log_user_prompt
          # = true so the captured logs include the full prompt/response (untruncated),
          # matching Claude's raw-bodies capture. Codex emits traces + logs only.
          # printf (not a heredoc) so the indented YAML block can't leak leading
          # whitespace into the .toml.
          mkdir -p /tmp/codex-home
          printf '%s\n' \
            '[otel]' \
            'environment = "ci"' \
            'log_user_prompt = true' \
            'exporter = { otlp-http = { endpoint = "http://localhost:4318", protocol = "binary" } }' \
            > /tmp/codex-home/config.toml

          # On provider=bedrock, point Codex at its built-in amazon-bedrock
          # provider so inference runs an OpenAI model inside the caller's AWS
          # account. Codex uses the AWS SDK credential chain, so the creds the
          # OIDC step exported are picked up with no extra config. The model is an
          # OpenAI model ID (e.g. openai.gpt-5.5) — NOT Claude: Bedrock Claude
          # speaks the Messages API, which Codex does not use.
          if [[ "${CODEX_PROVIDER:-}" == "bedrock" ]]; then
            echo "[test-classifier] Codex → Bedrock: model=${CODEX_BEDROCK_MODEL} region=${CODEX_BEDROCK_REGION}"
            printf '%s\n' \
              "model = \"${CODEX_BEDROCK_MODEL}\"" \
              'model_provider = "amazon-bedrock"' \
              '[model_providers.amazon-bedrock]' \
              'name = "Amazon Bedrock"' \
              "[model_providers.amazon-bedrock.aws]" \
              "region = \"${CODEX_BEDROCK_REGION}\"" \
              >> /tmp/codex-home/config.toml
          fi

      - name: Run AI test classifier
        env:
          AI_REVIEW_TOOL: ${{ inputs.tool }}
          CI: 'true'
          # Grant the agent execution so it locates, installs, and RUNS the
          # repo's suite for OBSERVED verdicts. Safe here (ephemeral runner);
          # the dispatcher keeps the local default read-only when this is unset.
          AI_RUN_SUITE: '1'
          # On provider=bedrock, ANTHROPIC_API_KEY MUST be blank: a non-empty key
          # makes the Claude Code CLI call the direct Anthropic API and ignore
          # Bedrock. The AWS creds from the OIDC step + CLAUDE_CODE_USE_BEDROCK
          # below route inference through Bedrock instead.
          ANTHROPIC_API_KEY: ${{ inputs.provider == 'bedrock' && '' || secrets.ANTHROPIC_API_KEY }}
          # On bedrock, blank OPENAI_API_KEY too so the codex path routes through
          # the config.toml amazon-bedrock provider unambiguously (no direct-API
          # fallback). Unused on the claude path either way.
          OPENAI_API_KEY:    ${{ inputs.provider == 'bedrock' && '' || secrets.OPENAI_API_KEY }}
          # ── Bedrock routing (claude+bedrock only; blank otherwise) ──────────
          # CLAUDE_CODE_USE_BEDROCK flips the Claude Code CLI to the Bedrock
          # Invoke API; it then uses the AWS creds the OIDC step put in the env.
          # AWS_REGION is required and is NOT read from ~/.aws. ANTHROPIC_MODEL
          # must be a cross-region inference profile ID (us. prefix) or Bedrock
          # rejects it; empty bedrock-model falls back to the Sonnet profile.
          # (The codex+bedrock path is configured via config.toml in the OTel
          # bootstrap step, not these Claude-specific vars.)
          CLAUDE_CODE_USE_BEDROCK: ${{ (inputs.provider == 'bedrock' && inputs.tool == 'claude') && '1' || '' }}
          AWS_REGION:       ${{ inputs.provider == 'bedrock' && inputs.aws-region || '' }}
          # Static auth: a long-lived Bedrock API key. Both the Claude Code CLI
          # and Codex's bedrock provider honor it (it takes precedence over SigV4).
          # On the OIDC path this is blank and the assumed-role creds are used.
          AWS_BEARER_TOKEN_BEDROCK: ${{ (inputs.provider == 'bedrock' && inputs.aws-auth == 'static') && secrets.AWS_BEARER_TOKEN_BEDROCK || '' }}
          ANTHROPIC_MODEL:  ${{ (inputs.provider == 'bedrock' && inputs.tool == 'claude') && (inputs.bedrock-model != '' && inputs.bedrock-model || 'us.anthropic.claude-sonnet-4-6') || '' }}
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF:  ${{ github.event.pull_request.base.ref }}

          # Point Codex at the OTel config.toml the bootstrap step generated, so
          # `codex exec` exports traces+logs to the in-job collector. Harmless for
          # the claude/copilot paths (Codex CLI isn't invoked there).
          CODEX_HOME: /tmp/codex-home

          # ── Observability (Claude Code native OpenTelemetry) ───────────────
          # NOTE: every var in this block is gated on tool == 'claude' and blanks
          # to '' otherwise. Codex configures OTel via its own config.toml (see the
          # bootstrap step) pointed at the in-job collector; leaving the standard
          # OTEL_EXPORTER_OTLP_* env set during a codex run risks Codex's SDK
          # picking them up and bypassing the local collector (→ no file artifact).
          # Keeping them claude-only is the safe, explicit boundary.
          #
          # Telemetry is enabled, but the span/metric EXPORTER defaults to `none`.
          # Why: Claude's `console` exporter writes to STDOUT, which collides with
          # the dispatcher's parsed result (it dumped ~875KB of metric JSON into
          # the classification record before we caught it). So by default we do
          # NOT export spans/metrics to a stream — we capture the run two cleaner
          # ways instead:
          #   • agent-bodies/  — full untruncated request/response JSON via
          #     OTEL_LOG_RAW_API_BODIES=file:<dir> (written straight to disk, no
          #     stream, no stdout collision). This is the rich per-call record.
          #   • the CI log     — the dispatcher's own [test-classifier] progress.
          # To ship real spans/metrics to a backend, set repo/org var
          # OTEL_EXPORTER=otlp + OTEL_EXPORTER_OTLP_ENDPOINT (+ _PROTOCOL / the
          # _HEADERS secret). OTLP is a NETWORK exporter, so it never touches
          # stdout — safe to turn on without corrupting the result. No code change.
          # (The same OTEL_EXPORTER var also turns on backend forwarding for the
          # codex collector — see the "Start OTel collector for Codex" step.)
          CLAUDE_CODE_ENABLE_TELEMETRY: ${{ inputs.tool == 'claude' && '1' || '' }}
          OTEL_METRICS_EXPORTER: ${{ inputs.tool == 'claude' && (vars.OTEL_EXPORTER || 'none') || '' }}
          OTEL_LOGS_EXPORTER:    ${{ inputs.tool == 'claude' && (vars.OTEL_EXPORTER || 'none') || '' }}
          OTEL_TRACES_EXPORTER:  ${{ inputs.tool == 'claude' && (vars.OTEL_EXPORTER || 'none') || '' }}
          # Short-lived run: shrink export intervals and raise the shutdown
          # flush timeout so telemetry isn't lost when OTLP export IS enabled.
          OTEL_METRIC_EXPORT_INTERVAL: '2000'
          OTEL_LOGS_EXPORT_INTERVAL:   '500'
          CLAUDE_CODE_OTEL_SHUTDOWN_TIMEOUT_MS: '8000'
          # Full conversation bodies to a dir (untruncated, written synchronously
          # by Claude — no flush race, no stdout collision). Contains repo code +
          # full reasoning; lives only in the run's artifact on the ephemeral runner.
          OTEL_LOG_RAW_API_BODIES: ${{ inputs.tool == 'claude' && 'file:classifier-out/agent-bodies' || '' }}
          OTEL_LOG_TOOL_DETAILS: ${{ inputs.tool == 'claude' && '1' || '' }}
          # OTLP passthrough (only used when OTEL_EXPORTER=otlp is set), claude-only;
          # the codex path consumes these same vars in its collector bootstrap step.
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ inputs.tool == 'claude' && vars.OTEL_EXPORTER_OTLP_ENDPOINT || '' }}
          OTEL_EXPORTER_OTLP_PROTOCOL: ${{ inputs.tool == 'claude' && vars.OTEL_EXPORTER_OTLP_PROTOCOL || '' }}
          OTEL_EXPORTER_OTLP_HEADERS:  ${{ inputs.tool == 'claude' && secrets.OTEL_EXPORTER_OTLP_HEADERS || '' }}
          OTEL_RESOURCE_ATTRIBUTES: service.name=ai-test-classifier,pr=${{ github.event.pull_request.number }},repo=${{ github.repository }}
        run: |
          set -euo pipefail

          if [[ -z "${PR_NUMBER:-}" ]]; then
            echo "::warning::No PR context. Skipping."; exit 0
          fi

          # The bundle's testing/ tree was staged into the caller's workspace,
          # so the dispatcher and its prompt see the same repo-relative layout
          # as a local/vendored install, while git diff still sees the caller's PR.
          DISPATCHER="testing/classifier/.skills/test-classifier/scripts/test-classifier-dispatcher.sh"

          # Make origin/<base-ref> resolvable for the diff range.
          git fetch --no-tags --depth=200 origin "${BASE_REF}:refs/remotes/origin/${BASE_REF}" || true

          # The raw-bodies dir must exist before Claude writes to it.
          mkdir -p classifier-out/agent-bodies

          # Classify the PR's failing tests and post ONE comment with the 👍/👎 ask.
          # stdout → the clean classification record (parsed result + report);
          # stderr → normal diagnostics, echoed to the CI log.
          "${DISPATCHER}" --pr "${PR_NUMBER}" --post-comment \
            | tee classifier-out/classification.txt

      # Flush the Codex collector and fold its JSONL into the artifact dir, so a
      # codex run's traces ride along in the same `ai-test-classification`
      # artifact as Claude's agent-bodies/ — one capture location per provider.
      - name: Collect Codex OTel traces
        if: always() && inputs.tool == 'codex'
        run: |
          set -uo pipefail
          # Give the collector a moment to flush its final batch, then stop it.
          sleep 2
          docker stop codex-otel >/dev/null 2>&1 || true
          docker logs codex-otel >/tmp/codex-otel/collector.log 2>&1 || true
          mkdir -p classifier-out/codex-otel
          cp -f /tmp/codex-otel/codex-traces.jsonl classifier-out/codex-otel/ 2>/dev/null \
            || echo "[test-classifier] no Codex trace file produced"
          cp -f /tmp/codex-otel/collector.log classifier-out/codex-otel/ 2>/dev/null || true

      - name: Upload classification record
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-test-classification
          path: classifier-out/
          if-no-files-found: ignore
