# .github/workflows/test-classifier.yml
#
# REUSABLE workflow for the AI test classifier.
#
# This is the supported way to consume the classifier in another repo WITHOUT
# vendoring the bundle's files. A consumer repo adds a tiny caller workflow that
# references this one at the `@pilot` tag — no copied scripts:
#
#   # .github/workflows/ai-test-classifier.yml in the CONSUMER repo
#   name: AI test classifier
#   on:
#     pull_request:
#       types: [opened, synchronize, reopened]
#   jobs:
#     classify:
#       uses: navapbc/ai-transformation-delivery-systems/.github/workflows/test-classifier.yml@pilot
#       with:
#         tool: claude          # claude | codex | copilot
#         # ref: <sha>          # optional: override the bundle ref; defaults to @pilot
#       secrets:
#         ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
#         # OPENAI_API_KEY:  ${{ secrets.OPENAI_API_KEY }}   # only if tool=codex
#
# `pilot` is a MOVING tag that always tracks the latest classifier on main; the
# move-tag.yml workflow re-points it automatically whenever the classifier
# changes on main. Consumers who reference `@pilot` therefore auto-update with
# no yaml change; they set this caller up once and never touch it. A team that
# wants to freeze a specific version can pin `@<commit-sha>` instead, at the cost
# of bumping it manually. (The source repo is public, so the consumer's default
# token resolves this workflow and checks out its scripts; no PAT needed.)

name: AI test classifier (reusable)

on:
  workflow_call:
    inputs:
      tool:
        description: 'AI CLI to use: claude | codex | copilot'
        type: string
        required: true
      ref:
        description: >
          Git ref (tag/branch/SHA) of the source repo to check out the
          classifier scripts from. Defaults to the moving 'pilot' tag (latest on
          main). Override only to freeze a specific version; keep it in sync with
          the ref you pinned the uses: line to.
        type: string
        default: ''
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false

# Least-privilege: read the consumer's code; write the PR comment.
permissions:
  contents: read
  pull-requests: write

jobs:
  classify:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    # The agent locates, installs, and RUNS the repo's suite (AI_RUN_SUITE=1),
    # which is much slower than diff-only triage. Bound the job so a stuck
    # install/test can't run for the full 6h default. AI_SUITE_TIMEOUT_SECS in
    # the dispatcher is the inner bound; this is the outer one.
    timeout-minutes: 30
    steps:
      - name: Validate inputs
        env:
          TOOL: ${{ inputs.tool }}
        run: |
          case "${TOOL}" in claude|codex|copilot) ;; *)
            echo "::error::inputs.tool='${TOOL}' invalid. Must be claude | codex | copilot"; exit 1 ;;
          esac

      # 1. The CONSUMER's repo — this is what the dispatcher diffs and classifies.
      - name: Check out the caller's repo (the change under test)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      # 2. THIS bundle's scripts. The source repo is public, so a plain
      #    actions/checkout of it works with the default token — no tarball, no
      #    PAT, no access gymnastics. We use `inputs.ref` (a tag/SHA the caller
      #    can override), defaulting to the moving `pilot` tag so the scripts
      #    match the latest released workflow. Lands in ./.classifier-bundle.
      - name: Check out the classifier bundle (pinned)
        uses: actions/checkout@v4
        with:
          repository: navapbc/ai-transformation-delivery-systems
          ref: ${{ inputs.ref != '' && inputs.ref || 'pilot' }}
          path: .classifier-bundle
          fetch-depth: 1

      # Stage the bundle's testing/ tree into the caller's workspace so every
      # repo-relative path the dispatcher and its prompt use (e.g.
      # testing/classifier/.skills/test-classifier/SKILL.md) resolves exactly as
      # in a local or vendored install — one dispatcher code path for all.
      - name: Stage the bundle into the workspace
        run: |
          set -euo pipefail
          cp -R .classifier-bundle/testing "$GITHUB_WORKSPACE/testing"
          chmod +x testing/classifier/.skills/_lib/ai-classifier-dispatch.sh
          chmod +x testing/classifier/.skills/test-classifier/scripts/test-classifier-dispatcher.sh
          chmod +x testing/classifier/scripts/sync-skills.sh

      - name: Sync canonical SKILL.md into the chosen tool's directory
        working-directory: testing/classifier
        env:
          AI_REVIEW_TOOL: ${{ inputs.tool }}
        run: scripts/sync-skills.sh

      - name: Install AI CLI — Claude Code
        if: inputs.tool == 'claude'
        run: npm install -g @anthropic-ai/claude-code
      - name: Install AI CLI — Codex
        if: inputs.tool == 'codex'
        run: npm install -g @openai/codex
      - name: Install AI CLI — Copilot
        if: inputs.tool == 'copilot'
        run: npm install -g @github/copilot

      - name: Run AI test classifier
        env:
          AI_REVIEW_TOOL: ${{ inputs.tool }}
          CI: 'true'
          # Grant the agent execution so it locates, installs, and RUNS the
          # repo's suite for OBSERVED verdicts. Safe here (ephemeral runner);
          # the dispatcher keeps the local default read-only when this is unset.
          AI_RUN_SUITE: '1'
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF:  ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail

          if [[ -z "${PR_NUMBER:-}" ]]; then
            echo "::warning::No PR context. Skipping."; exit 0
          fi

          # The bundle's testing/ tree was staged into the caller's workspace,
          # so the dispatcher and its prompt see the same repo-relative layout
          # as a local/vendored install, while git diff still sees the caller's PR.
          DISPATCHER="testing/classifier/.skills/test-classifier/scripts/test-classifier-dispatcher.sh"

          # Make origin/<base-ref> resolvable for the diff range.
          git fetch --no-tags --depth=200 origin "${BASE_REF}:refs/remotes/origin/${BASE_REF}" || true

          # Classify the PR's failing tests and post ONE comment with the 👍/👎 ask.
          # The full report is also captured as a CI artifact.
          mkdir -p classifier-out
          "${DISPATCHER}" --pr "${PR_NUMBER}" --post-comment \
            | tee classifier-out/classification.txt

      - name: Upload classification record
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-test-classification
          path: classifier-out/
          if-no-files-found: ignore
