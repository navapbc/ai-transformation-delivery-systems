# .github/workflows/classifier-metrics-sweep.yml
#
# NIGHTLY reaction backfill for the AI test classifier metrics.
#
# Two writers feed the "Testing Events" tab. The classifier dispatcher appends a
# row (repo, pr, comment_id, created_at, verdict, category, confidence) the
# moment it posts a comment — that is the post-time writer. This workflow is the
# second: human 👍/👎 reactions arrive later and GitHub emits NO event when a
# reaction is added (https://github.com/orgs/community/discussions/20824), so on
# a schedule we read the rows already in the sheet, fetch each comment's current
# reaction counts, and write back ONLY the thumbs_up/thumbs_down columns. It does
# not search GitHub or crawl PRs — the sheet rows are the work list, one GET per
# comment_id, one batched sheet update.
#
# Auth: keyless via Workload Identity Federation. GitHub's OIDC token is
# exchanged for a short-lived token that impersonates the metrics-sheets-writer
# service account, which has Editor access to the metrics spreadsheet ONLY (no
# project-level IAM). No service-account key is stored anywhere.

name: Classifier metrics sweep

on:
  # Nightly cron is DISABLED until one manual workflow_dispatch run confirms the
  # WIF auth chain (GitHub OIDC → service account → Sheets) works end-to-end.
  # Once a dispatch run succeeds, uncomment to turn on the nightly backfill. The
  # backfill updates existing rows in place, so running it nightly just refreshes
  # the 👍/👎 counts — it never duplicates rows.
  # schedule:
  #   # 07:00 UTC daily.
  #   - cron: "0 7 * * *"
  workflow_dispatch: {}

# WIF needs the OIDC token; the sweep only reads public PR data + writes the
# Sheet (via the SA), so the GITHUB_TOKEN itself needs no write scopes.
permissions:
  contents: read
  id-token: write

# Never let two sweeps append concurrently to the same tab.
concurrency:
  group: classifier-metrics-sweep
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the bundle
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (keyless, WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # Provider resource path + SA to impersonate. Non-secret identifiers,
          # but kept in repo variables (not committed literals) so this public
          # repo doesn't broadcast the exact GCP targets. The real control is the
          # provider's attribute condition (set in GCP at creation time).
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.METRICS_SA_EMAIL }}
          # The harvester writes to Sheets, so mint the access token with the
          # Sheets scope (the default cloud-platform scope cannot call the
          # Sheets API). `token_format: access_token` yields the ya29.* bearer
          # the script expects in GOOGLE_SHEETS_TOKEN.
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/spreadsheets

      - name: Run the reaction backfill
        env:
          # gh CLI reads GH_TOKEN, used to GET each comment's reactions. The
          # default job token (github.token) is scoped to THIS repo only — it can
          # read PUBLIC pilot repos' comments but CANNOT read PRIVATE ones. For
          # private pilot repos, the maintainer stores ONE fine-grained read PAT
          # (Contents+PR+Metadata: read, scoped to the pilot repos) as the
          # PILOT_REPOS_READ_TOKEN secret; we prefer it when present and fall back
          # to the default token otherwise. See testing/classifier/docs/SETUP.md
          # "Metrics read access".
          GH_TOKEN: ${{ secrets.PILOT_REPOS_READ_TOKEN || github.token }}
          # WIF-minted bearer token + the spreadsheet id (a repo variable, not a
          # committed literal — keeps the target sheet out of public code).
          GOOGLE_SHEETS_TOKEN: ${{ steps.auth.outputs.access_token }}
          SHEET_ID: ${{ vars.METRICS_SHEET_ID }}
          # Default tab is "Testing Events" (set in the script); override here if
          # the tab is ever renamed, without touching the script.
          SHEET_RANGE: "'Testing Events'!A1"
        run: bash testing/metrics/test_classifier_comments.sh
