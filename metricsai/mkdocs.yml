site_name: metricsai
site_description: Pluggable collector for AI-in-SDLC metrics.
repo_url: https://github.com/navapbc/metricsai

theme:
  name: material
  features:
    - navigation.sections
    - content.code.copy

nav:
  - Overview: index.md
  - Usage: usage.md
  - Modules: modules.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
