# .pre-commit-config.yaml
#
# Pre-commit hooks for AI-assisted code security and IaC compliance review.
#
# Hooks:
#   вЂў code-security      вЂ” runs the code-security skill on every commit
#   вЂў iac-compliance     вЂ” runs the iac-compliance skill when IaC files are
#                          present in the staged diff
#   вЂў skills-in-sync     вЂ” fails if SKILL.md was edited but sync-skills.sh
#                          was not run (keeps .claude/, .codex/, and
#                          .github/copilot/ copies identical)
#
# Setup instructions: see README.md
#
# To install hooks:    pre-commit install
# To run manually:     pre-commit run code-security
#                  or: pre-commit run code-security --all-files
#
# Both review hooks require the AI_REVIEW_TOOL environment variable to be set
# to one of: claude | codex | copilot. See README.md, section "AI tool
# selection (AI_REVIEW_TOOL)".

repos:
  - repo: local
    hooks:

      # в”Ђв”Ђ Code security review в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - id: code-security
        name: AI-assisted code security review
        language: script
        entry: .claude/skills/code-security/scripts/code-security-hook-dispatcher.sh
        # The dispatcher itself decides what to do based on the staged diff.
        # We do not constrain by file type вЂ” secrets / PII / PHI can appear
        # in any file.
        types: []
        pass_filenames: false
        always_run: true
        verbose: true
        stages: [pre-commit]

      # в”Ђв”Ђ IaC compliance review в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - id: iac-compliance
        name: AI-assisted IaC compliance review (CMS ARS 5.1 / NIST 800-53 Rev 5)
        language: script
        entry: .claude/skills/iac-compliance/scripts/iac-compliance-hook-dispatcher.sh
        # File filter at the pre-commit layer for fast short-circuit; the
        # dispatcher's own filter is a defense-in-depth second check.
        types: []
        files: >-
          (?x)^(
            .*\.tf$|
            .*\.tfvars$|
            .*\.tf\.json$|
            .*\.bicep$|
            .*\.bicepparam$|
            .*\.hcl$|
            .*\.template\.json$|
            .*\.template\.ya?ml$|
            .*\.ya?ml$|
            cdk\.json$|
            Pulumi\.ya?ml$
          )$
        pass_filenames: false
        always_run: false
        verbose: true
        stages: [pre-commit]

      # в”Ђв”Ђ Skill-file synchronization guard в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      # The canonical SKILL.md lives under .claude/skills/<skill>/. The
      # .codex/ and .github/copilot/ copies are derived. This hook runs in
      # --check mode and fails if any derived copy is out of date, so a
      # SKILL.md edit can't slip in without re-running scripts/sync-skills.sh.
      - id: skills-in-sync
        name: Skill files in sync across AI-tool locations
        language: script
        entry: scripts/sync-skills.sh
        args: ['--check']
        # Only relevant when a SKILL.md file is touched.
        files: >-
          (?x)^(
            \.claude/skills/[^/]+/SKILL\.md$|
            \.codex/skills/[^/]+/SKILL\.md$|
            \.github/copilot/skills/[^/]+/SKILL\.md$
          )$
        pass_filenames: false
        always_run: false
        verbose: true
        stages: [pre-commit]
